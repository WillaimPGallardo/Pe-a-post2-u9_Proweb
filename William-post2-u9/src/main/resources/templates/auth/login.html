<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="container">
        <h1>Iniciar Sesión</h1>

        <!-- Spring Security procesa el POST a /login automáticamente -->
        <form th:action="@{/login}" method="post">

            <div th:if="${param.error}" class="alert alert-error">
                Correo o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                Sesión cerrada correctamente.
            </div>
            <div th:if="${param.registrado}" class="alert alert-success">
                Registro exitoso. Inicie sesión.
            </div>

            <div class="form-group">
                <label for="username">Correo:</label>
                <input type="email" id="username" name="username" required />
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required />
            </div>

            <!-- Thymeleaf + Spring Security incluye el token CSRF automáticamente -->
            <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>

        <p><a th:href="@{/registro}">¿No tiene cuenta? Registrarse</a></p>
    </div>
</body>
</html>
