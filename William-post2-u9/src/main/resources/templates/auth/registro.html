<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="container">
        <h1>Registro de Usuario</h1>

        <form th:action="@{/registro}" th:object="${usuario}" method="post">

            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" th:field="*{nombre}" required />
                <span class="field-error" th:if="${#fields.hasErrors('nombre')}"
                      th:errors="*{nombre}"></span>
            </div>

            <div class="form-group">
                <label for="email">Correo:</label>
                <input type="email" id="email" th:field="*{email}" required />
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="contrasenia">Contraseña:</label>
                <input type="password" id="contrasenia" th:field="*{contrasenia}" required />
                <span class="field-error" th:if="${#fields.hasErrors('contrasenia')}"
                      th:errors="*{contrasenia}"></span>
            </div>

            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>

        <p><a th:href="@{/login}">¿Ya tiene cuenta? Iniciar sesión</a></p>
    </div>
</body>
</html>
