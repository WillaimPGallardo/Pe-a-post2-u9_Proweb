spring.application.name=seguridad

# ===========================================
# Configuracion MySQL
# ===========================================
# Ajusta estos valores a tu instalacion local de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/estudiantes_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
# JPA / Hibernate
# ===========================================
# update: crea/actualiza tablas automaticamente segun las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================================
# Thymeleaf
# ===========================================
# Desactivar cache durante el desarrollo para ver cambios de inmediato
spring.thymeleaf.cache=false

# ===========================================
# Servidor
# ===========================================
server.port=8080

# ===========================================
# Logging (util para debug de Spring Security)
# ===========================================
logging.level.org.springframework.security=INFO
